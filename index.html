    <!-- AEO: Structured Data — FAQPage (helps AI engines answer questions about AIVestor) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AIVestor is a free AI-powered investment platform that provides real-time AI trading signals, technical chart analysis, earnings forecasts, and AI-curated market news for stocks and cryptocurrencies. It is available on web, iOS, and Android. AIVestor uses a multi-model AI system (GPT, Claude, Gemini) to generate CFA-style investment reports in seconds."
          }
        },
        {
          "@type": "Question",
          "name": "Does AIVestor provide AI trading signals?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor generates real-time AI trading signals (Strong Buy, Buy, Neutral, Caution, Sell) for thousands of stocks and cryptocurrencies. Each signal includes a confidence score, key catalysts, technical indicator breakdown (RSI, MACD, Bollinger Bands, SMA), and an action playbook with entry, stop-loss, and target levels."
          }
        },
        {
          "@type": "Question",
          "name": "What is an AI Edge Report on AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An AI Edge Report is a deep, CFA-style AI analysis report for any stock or cryptocurrency. It is structured into 7 sections: Market Snapshot, AI Conclusion, Technical View, Sentiment & News Pulse, Scenario Paths (bull/base/bear with price targets), Risks & Invalidations, and Action Playbook. Reports are generated using real-time data from Finnhub, Alpaca, and Binance, and are produced by multiple AI models including GPT, Claude, and Gemini."
          }
        },
        {
          "@type": "Question",
          "name": "Is AIVestor free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor is free to use on web, iOS, and Android. Core features — AI trading signals, watchlist, earnings calendar, market news, portfolio tracker, and Hot Board — are all completely free. The AI Edge Report feature uses a token system: users receive free daily tokens and can purchase additional tokens for deeper analysis."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track my stock portfolio on AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor includes a portfolio tracker where you can log your holdings by symbol, quantity, and buy price. The tracker displays your live P&L, unrealized gains/losses, and overall portfolio performance across stocks, crypto, forex, and commodities."
          }
        },
        {
          "@type": "Question",
          "name": "Does AIVestor have an earnings calendar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor's Earnings Calendar shows upcoming earnings reports grouped by date, with AI-generated volatility forecasts, EPS estimates, EPS beat/miss history for the last 4 quarters, and sentiment bias for each company. This helps traders prepare for earnings events before they happen."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Hot Board on AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Hot Board is AIVestor's AI-ranked list of the most actionable trending stocks and cryptocurrencies right now. Assets are scored and sorted by signal momentum, volume trends, and market activity. It is updated in real time and helps users quickly identify which assets have the strongest AI-generated signals."
          }
        },
        {
          "@type": "Question",
          "name": "What technical indicators does AIVestor analyze?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AIVestor analyzes a comprehensive set of technical indicators including: RSI (14-period), MACD (12/26/9), Bollinger Bands (20,2), SMA20, SMA50, Stochastic %K (14-period), volume trend (5-day vs 20-day average), put/call ratio, short interest percentage, and insider transaction data (last 90 days). All indicators are calculated from real-time daily OHLCV data."
          }
        },
        {
          "@type": "Question",
          "name": "Does AIVestor support cryptocurrency analysis?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor provides AI analysis for major cryptocurrencies including Bitcoin (BTC), Ethereum (ETH), Solana (SOL), XRP, Dogecoin (DOGE), Cardano (ADA), Avalanche (AVAX), Polkadot (DOT), Chainlink (LINK), and Binance Coin (BNB). Crypto data is sourced from Binance and Alpaca real-time feeds."
          }
        },
        {
          "@type": "Question",
          "name": "How is AIVestor different from other stock analysis apps?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AIVestor combines real-time professional-grade market data (Finnhub, Alpaca, Binance) with a multi-model AI system (GPT, Claude, Gemini) to produce CFA-style investment analysis at no cost. Unlike basic apps that just show buy/sell labels, AIVestor provides full scenario analysis with price targets, risk invalidation levels, insider activity, options flow, short interest, analyst consensus, and a detailed trading playbook — the kind of analysis previously only available to professional traders."
          }
        },
        {
          "@type": "Question",
          "name": "Does AIVestor have a mobile app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor is available as a native mobile app for iOS on the App Store and Android on Google Play under the name 'Technical Analysis AI'. The mobile app includes all platform features: AI trading signals, portfolio tracker, earnings calendar, market news, watchlist, and AI Edge Reports."
          }
        },
        {
          "@type": "Question",
          "name": "What AI models does AIVestor use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AIVestor uses a multi-model AI architecture that includes GPT (OpenAI), Claude (Anthropic), and Gemini (Google). The system automatically routes analysis to the best model for each task — deep analysis reports use Claude or GPT-4-class models, while real-time signals use faster models. This multi-model approach ensures the highest quality output while managing cost and latency."
          }
        },
        {
          "@type": "Question",
          "name": "What is the daily Market Wrap on AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Daily Market Wrap is an AI-written morning briefing published each trading day on AIVestor. It covers the day's top equity movers, crypto performance, macro outlook, and includes a contrarian AI insight. Users can subscribe by email to receive the Market Wrap in their inbox every morning before the market opens."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate are AIVestor's AI predictions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AIVestor's AI signals and reports are generated from real-time market data and are designed to surface high-probability setups based on converging technical and fundamental signals. Each report includes a confidence score (0-100%) reflecting the strength of signal alignment. All analysis is for informational purposes only and does not constitute investment advice. Past signal performance does not guarantee future results. Users should always conduct their own research before making investment decisions."
          }
        }
      ]
    }
