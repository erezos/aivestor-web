<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />

    <!-- Primary SEO -->
    <title>AIVestor — AI-Powered Stock & Crypto Analysis</title>
    <meta name="description" content="AIVestor gives you real-time AI trading signals, technical chart analysis, earnings forecasts, and market news for stocks, crypto, and more. Make smarter investment decisions with AI." />
    <meta name="keywords" content="AI stock analysis, AI trading signals, crypto analysis, technical analysis, earnings calendar, stock watchlist, portfolio tracker, market news, investment AI" />
    <meta name="author" content="AIVestor" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aivestor.online/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aivestor.online/" />
    <meta property="og:title" content="AIVestor — AI-Powered Stock & Crypto Analysis" />
    <meta property="og:description" content="Real-time AI trading signals, technical chart analysis, earnings forecasts, and curated market news. Your AI edge for stocks and crypto." />
    <meta property="og:image" content="https://aivestor.online/og-image.png" />
    <meta property="og:site_name" content="AIVestor" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aivestor" />
    <meta name="twitter:title" content="AIVestor — AI-Powered Stock & Crypto Analysis" />
    <meta name="twitter:description" content="Real-time AI trading signals, technical chart analysis, earnings forecasts, and curated market news. Your AI edge for stocks and crypto." />
    <meta name="twitter:image" content="https://aivestor.online/og-image.png" />

    <!-- AEO: Structured Data — SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AIVestor",
      "url": "https://aivestor.online",
      "description": "AIVestor is an AI-powered investment platform providing real-time trading signals, technical chart analysis, earnings calendars, portfolio tracking, and AI-curated market news for stocks and cryptocurrencies.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI trading signals for stocks and crypto",
        "Real-time technical chart analysis",
        "Earnings calendar with AI volatility forecasts",
        "AI-curated market news with sentiment analysis",
        "Portfolio tracker with P&L calculation",
        "Watchlist with live price alerts",
        "Hot Board — AI-ranked trending assets"
      ],
      "screenshot": "https://aivestor.online/og-image.png",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1200"
      }
    }
    </script>

    <!-- AEO: Structured Data — FAQPage (helps AI engines answer questions about AIVestor) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AIVestor is an AI-powered investment platform that provides real-time trading signals, technical chart analysis, earnings forecasts, and AI-curated market news for stocks and cryptocurrencies."
          }
        },
        {
          "@type": "Question",
          "name": "Does AIVestor provide AI trading signals?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor uses AI to generate trading signals (Strong Buy, Buy, Neutral, Caution, Sell) for stocks and crypto, along with confidence scores and technical indicator analysis."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track my stock portfolio on AIVestor?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor includes a portfolio tracker where you can log your holdings, track live P&L, and monitor performance across stocks, crypto, forex, and commodities."
          }
        },
        {
          "@type": "Question",
          "name": "Does AIVestor have an earnings calendar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. AIVestor's Earnings Calendar shows upcoming earnings reports grouped by date, with AI-generated volatility forecasts and sentiment bias for each company."
          }
        },
        {
          "@type": "Question",
          "name": "Is AIVestor free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, AIVestor is free to use on web, iOS, and Android."
          }
        }
      ]
    }
    </script>

    <!-- AEO: Structured Data — Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AIVestor",
      "url": "https://aivestor.online",
      "logo": "https://aivestor.online/logo.png",
      "description": "AIVestor is a free AI-powered investment platform with real-time trading signals, earnings forecasts, market news, and portfolio tracking for stocks and crypto.",
      "sameAs": [
        "https://apps.apple.com/us/app/technical-analysis-ai/id6746874804",
        "https://play.google.com/store/apps/details?id=com.ioa.TipSync"
      ]
    }
    </script>

    <!-- AEO: Structured Data — WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AIVestor",
      "url": "https://aivestor.online",
      "description": "Free AI-powered investment platform — trading signals, earnings calendar, market news, and portfolio tracker for stocks and crypto.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://aivestor.online/Asset?symbol={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- AEO: Structured Data — FinancialProduct (AI Signals) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "AIVestor AI Trading Signals",
      "url": "https://aivestor.online/HotBoard",
      "provider": {
        "@type": "Organization",
        "name": "AIVestor"
      },
      "description": "AI-generated trading signals for stocks and cryptocurrencies. Signals include Strong Buy, Buy, Neutral, Caution, and Sell ratings with confidence scores and technical indicator breakdowns.",
      "serviceType": "AI Investment Analysis",
      "areaServed": "Worldwide",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free AI trading signals and market analysis"
      }
    }
    </script>

    <!-- AEO: Structured Data — ItemList (Key Features) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "AIVestor Features",
      "description": "Key features of the AIVestor AI investment platform",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "AI Trading Signals",
          "description": "Real-time AI signals (Strong Buy to Sell) for thousands of stocks and crypto assets, powered by technical analysis and machine learning.",
          "url": "https://aivestor.online/HotBoard"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Earnings Calendar",
          "description": "Upcoming earnings reports with AI-generated volatility forecasts and EPS beat/miss history for public companies.",
          "url": "https://aivestor.online/Earnings"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "Daily Market Wrap",
          "description": "AI-written daily market briefing covering equities, crypto, macro outlook, and a contrarian AI insight. Delivered by email every morning.",
          "url": "https://aivestor.online/MarketWrap"
        },
        {
          "@type": "ListItem",
          "position": 4,
          "name": "Market News with Sentiment",
          "description": "Curated financial news with AI sentiment analysis (bullish/bearish/neutral) for stocks and crypto.",
          "url": "https://aivestor.online/News"
        },
        {
          "@type": "ListItem",
          "position": 5,
          "name": "Portfolio Tracker",
          "description": "Track your stock and crypto portfolio with live P&L, cost basis, and performance metrics.",
          "url": "https://aivestor.online/Dashboard"
        }
      ]
    }
    </script>

    <!-- AI Crawler hints -->
    <meta name="ai-content-type" content="financial-analysis-platform" />

  </head>

    <div id="root"></div>
